experiment_name: synthetic_quick
seed: 7
device: auto
output_dir: runs/synthetic_quick

dataset:
  name: synthetic-cifar10
  root: data
  download: false
  synthetic: true
  synthetic_size: 2000
  test_size: 500
  num_classes: 10
  channels: 3
  image_size: 32
  num_workers: 0
  partition: dirichlet

hfl:
  num_clients: 20
  num_edges: 5
  clients_per_edge: 4
  clients_per_round: 10
  rounds: 2
  local_epochs: 1
  dirichlet_alpha: 0.5
  share_number: 3
  reconstruction_threshold: 2
  colluding_edges: 2
  target_clients: 10

training:
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  max_batches_per_client: 2
  evaluate_every: 1

attack:
  feature_dim: 2048
  trials_per_target: 2
  dlg_steps: 60
  gismn_steps: 80
  private_classes: 10

lppf:
  lgs_clip_norm: 1.0
  lgs_noise_multiplier: 0.05
  crsa_noise_multiplier: 0.05
  shp_mask_ratio: 0.15
  shp_structured_dropout: 0.10
  par_lambda: 0.05
  private_classes: 10

baselines:
  dp_clip_norm: 1.0
  dp_noise_multiplier: 0.20
  awdp_base_noise: 0.12
  awdp_target_clip_quantile: 0.75
